services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rescale
      POSTGRES_USER: rescale
      POSTGRES_PASSWORD: rescale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rescale -d rescale"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_NAME: rescale
      DB_USER: rescale
      DB_PASSWORD: rescale
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: "django-docker-secret-change-in-production"
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  tests:
    build: ./tests
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
